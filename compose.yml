services:
  postgres:
    image: 'postgres:18-alpine'
    environment:
      - 'POSTGRES_DB=postgres'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'

  rabbitmq:
    image: 'rabbitmq:4.2.2-management'
    environment:
      - 'RABBITMQ_DEFAULT_USER=guest'
      - 'RABBITMQ_DEFAULT_PASS=guest'
    ports:
      - '5672:5672'
      - '15672:15672'

  grafana-lgtm:
    image: 'grafana/otel-lgtm:0.28.0'
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'

  spring-modular-monolith:
    image: sivaprasadreddy/spring-modular-monolith
    container_name: spring-modular-monolith
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
      TRACES_EXPORT_URL: http://grafana-lgtm:4318/v1/traces
      LOGS_EXPORT_URL: http://grafana-lgtm:4318/v1/logs
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq
      - grafana-lgtm
    restart: unless-stopped
    profiles:
      - app
