<div id="admin-product-delete-confirm" th:fragment="product-delete-confirm" xmlns:th="http://www.thymeleaf.org">

    <div class="mb-3">
        <a th:href="@{/admin/catalog/products/{code}(code=${code})}" class="btn btn-sm btn-outline-secondary">
            &larr; Back to Product
        </a>
    </div>

    <div class="orders-card p-4">
        <h5 class="mb-3">Delete Product</h5>
        <p class="text-muted mb-1">You are about to delete the following product:</p>
        <p class="fw-semibold mb-4" th:text="${product.name}">Product Name</p>
        <p class="text-danger mb-4">This action marks the product as deleted. It will no longer appear to customers.</p>

        <form th:action="@{/admin/catalog/products/{code}/delete(code=${code})}" method="post">
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a th:href="@{/admin/catalog/products/{code}(code=${code})}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>

</div>
