<div id="admin-products" th:fragment="products" xmlns:hx="http://www.w3.org/1999/xhtml">

    <nav aria-label="Page navigation" th:if="${productsPage.totalPages() > 1}">
        <ul class="pagination justify-content-end my-3">
            <li class="page-item" th:classappend="${!productsPage.hasPrevious()} ? disabled : ''">
                <a class="page-link rounded-start-pill" href="#"
                   th:hx-get="${'/admin/catalog/products?page=1'}"
                   th:hx-push-url="${'/admin/catalog/products?page=1'}"
                   hx-target="#admin-products" hx-swap="outerHTML">&laquo;</a>
            </li>
            <li class="page-item" th:classappend="${!productsPage.hasPrevious()} ? disabled : ''">
                <a class="page-link" href="#"
                   th:hx-get="${'/admin/catalog/products?page='+(productsPage.pageNumber() - 1)}"
                   th:hx-push-url="${'/admin/catalog/products?page='+(productsPage.pageNumber() - 1)}"
                   hx-target="#admin-products" hx-swap="outerHTML">Previous</a>
            </li>
            <li class="page-item active" aria-current="page">
                <span class="page-link" th:text="${productsPage.pageNumber()}">1</span>
            </li>
            <li class="page-item" th:classappend="${!productsPage.hasNext()} ? disabled : ''">
                <a class="page-link" href="#"
                   th:hx-get="${'/admin/catalog/products?page='+(productsPage.pageNumber() + 1)}"
                   th:hx-push-url="${'/admin/catalog/products?page='+(productsPage.pageNumber() + 1)}"
                   hx-target="#admin-products" hx-swap="outerHTML">Next</a>
            </li>
            <li class="page-item" th:classappend="${!productsPage.hasNext()} ? disabled : ''">
                <a class="page-link rounded-end-pill" href="#"
                   th:hx-get="${'/admin/catalog/products?page='+(productsPage.totalPages())}"
                   th:hx-push-url="${'/admin/catalog/products?page='+(productsPage.totalPages())}"
                   hx-target="#admin-products" hx-swap="outerHTML">&raquo;</a>
            </li>
        </ul>
    </nav>

    <div class="orders-card">
        <table class="table orders-table mb-0">
            <thead>
            <tr>
                <th>Image</th>
                <th>Code</th>
                <th>Name</th>
                <th>Price</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${productsPage.data}"
                th:classappend="${product.deletedAt() != null} ? 'table-secondary text-muted' : ''">
                <td>
                    <img th:if="${product.imageUrl != null}"
                         th:src="${product.imageUrl}"
                         alt="Product image"
                         class="admin-product-thumb"/>
                    <div th:if="${product.imageUrl == null}" class="admin-product-thumb-placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </div>
                </td>
                <td class="order-id" th:text="${product.code}">code</td>
                <td class="fw-semibold">
                    <a th:href="@{/admin/catalog/products/{code}(code=${product.code})}"
                       th:text="${product.name}">name</a>
                    <span th:if="${product.deletedAt() != null}" class="badge bg-danger ms-1">Deleted</span>
                </td>
                <td class="fw-semibold" style="color:#0d6efd" th:text="${'$' + product.price}">price</td>
                <td class="admin-product-desc text-muted" th:text="${product.description}">description</td>
                <td>
                    <a th:if="${product.deletedAt() == null}"
                       th:href="@{/admin/catalog/products/{code}/edit(code=${product.code})}"
                       class="btn btn-sm btn-warning">Edit</a>
                    <a th:if="${product.deletedAt() == null}"
                       th:href="@{/admin/catalog/products/{code}/delete(code=${product.code})}"
                       class="btn btn-sm btn-danger">Delete</a>
                    <form th:if="${product.deletedAt() != null}"
                          th:action="@{/admin/catalog/products/{code}/restore(code=${product.code})}"
                          method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-success">Restore</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
