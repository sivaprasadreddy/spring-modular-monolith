<div id="admin-products" th:fragment="products" xmlns:hx="http://www.w3.org/1999/xhtml">
    <nav aria-label="Page navigation" th:if="${productsPage.totalPages() > 1}">
        <ul class="pagination pagination justify-content-center">
            <li class="page-item" th:classappend="${!productsPage.hasPrevious()} ? disabled : ''">
                <a class="page-link" href="#"
                   th:hx-get="${'/admin/catalog/products?page=1'}"
                   th:hx-push-url="${'/admin/catalog/products?page=1'}"
                   hx-target="#admin-products" hx-swap="outerHTML">First</a>
            </li>
            <li class="page-item" th:classappend="${!productsPage.hasPrevious()} ? disabled : ''">
                <a class="page-link" href="#"
                   th:hx-get="${'/admin/catalog/products?page='+(productsPage.pageNumber() - 1)}"
                   th:hx-push-url="${'/admin/catalog/products?page='+(productsPage.pageNumber() - 1)}"
                   hx-target="#admin-products" hx-swap="outerHTML">Previous</a>
            </li>
            <li class="page-item" th:classappend="${!productsPage.hasNext()} ? disabled : ''">
                <a class="page-link" href="#"
                   th:hx-get="${'/admin/catalog/products?page='+(productsPage.pageNumber() + 1)}"
                   th:hx-push-url="${'/admin/catalog/products?page='+(productsPage.pageNumber() + 1)}"
                   hx-target="#admin-products" hx-swap="outerHTML">Next</a>
            </li>
            <li class="page-item" th:classappend="${!productsPage.hasNext()} ? disabled : ''">
                <a class="page-link" href="#"
                   th:hx-get="${'/admin/catalog/products?page='+(productsPage.totalPages())}"
                   th:hx-push-url="${'/admin/catalog/products?page='+(productsPage.totalPages())}"
                   hx-target="#admin-products" hx-swap="outerHTML">Last</a>
            </li>
        </ul>
    </nav>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Price</th>
                <th>Image</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${productsPage.data}">
                <td th:text="${product.code}">code</td>
                <td th:text="${product.name}">name</td>
                <td th:text="${'$' + product.price}">price</td>
                <td>
                    <img th:if="${product.imageUrl != null}"
                         th:src="${product.imageUrl}"
                         alt="Product image"
                         height="40" width="30"/>
                    <span th:if="${product.imageUrl == null}" class="text-muted">—</span>
                </td>
                <td th:text="${product.description}">description</td>
            </tr>
        </tbody>
    </table>
</div>
