<div class="order-form-card">
    <h5 class="order-form-title">Delivery Details</h5>
    <form class="row g-3" method="post" th:action="@{/orders}" th:object="${orderForm}">
        <div class="col-md-6">
            <label for="customerName" class="form-label">Customer Name</label>
            <input type="text" class="form-control"
                   id="customerName"
                   name="customer.name"
                   th:field="*{customer.name}"
                   th:classappend="${#fields.hasErrors('customer.name')} ? 'is-invalid' : ''"
                   placeholder="Jane Doe"/>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('customer.name')}"
                 th:errors="*{customer.name}">Incorrect data</div>
        </div>
        <div class="col-md-6">
            <label for="customerEmail" class="form-label">Email Address</label>
            <input type="email" class="form-control"
                   id="customerEmail"
                   name="customer.email"
                   th:field="*{customer.email}"
                   th:classappend="${#fields.hasErrors('customer.email')} ? 'is-invalid' : ''"
                   placeholder="jane@example.com"/>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('customer.email')}"
                 th:errors="*{customer.email}">Incorrect data</div>
        </div>
        <div class="col-md-6">
            <label for="customerPhone" class="form-label">Phone Number</label>
            <input type="text" class="form-control"
                   id="customerPhone"
                   name="customer.phone"
                   th:field="*{customer.phone}"
                   th:classappend="${#fields.hasErrors('customer.phone')} ? 'is-invalid' : ''"
                   placeholder="+1 555 000 0000"/>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('customer.phone')}"
                 th:errors="*{customer.phone}">Incorrect data</div>
        </div>
        <div class="col-md-6">
            <label for="deliveryAddress" class="form-label">Delivery Address</label>
            <input class="form-control"
                   id="deliveryAddress"
                   name="deliveryAddress"
                   th:field="*{deliveryAddress}"
                   th:classappend="${#fields.hasErrors('deliveryAddress')} ? 'is-invalid' : ''"
                   placeholder="123 Main St, City, State"/>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('deliveryAddress')}"
                 th:errors="*{deliveryAddress}">Incorrect data</div>
        </div>
        <div class="col-12 mt-2">
            <button type="submit" class="btn btn-buy px-5">Place Order</button>
        </div>
    </form>
</div>
