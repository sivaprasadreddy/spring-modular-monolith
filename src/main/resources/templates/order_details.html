<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <div class="order-details-page">

        <!-- Header -->
        <div class="order-details-header">
            <div>
                <a th:href="@{/orders}" class="order-back-link">
                    &larr; Back to Orders
                </a>
                <h2 class="order-details-heading mt-1">Order Details</h2>
            </div>
            <span class="order-status-badge order-status-badge-lg"
                  th:attr="data-status=${order.status}"
                  th:text="${order.status}">status</span>
        </div>

        <!-- Order meta -->
        <div class="order-meta-row">
            <div class="order-meta-item">
                <span class="order-meta-label">Order Number</span>
                <span class="order-meta-value" th:text="${order.orderNumber}">orderNumber</span>
            </div>
        </div>

        <!-- Items table -->
        <div class="orders-card mb-4">
            <div class="orders-card-title">Items</div>
            <table class="table orders-table mb-0">
                <thead>
                <tr>
                    <th>Product</th>
                    <th class="text-end">Price</th>
                    <th class="text-center">Qty</th>
                    <th class="text-end">Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td class="fw-semibold" th:text="${order.item.name}">name</td>
                    <td class="text-end text-muted" th:text="${'$' + order.item.price}">price</td>
                    <td class="text-center" th:text="${order.item.quantity}">quantity</td>
                    <td class="text-end fw-semibold" th:text="${'$' + order.item.quantity * order.item.price}">subtotal</td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="cart-total-row">
                    <td colspan="3" class="text-end text-muted">Order Total</td>
                    <td class="text-end cart-total-amount" th:text="${'$' + order.totalAmount}">totalAmount</td>
                </tr>
                </tfoot>
            </table>
        </div>

        <!-- Customer & delivery info -->
        <div class="orders-card">
            <div class="orders-card-title">Customer &amp; Delivery</div>
            <div class="orders-card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="order-detail-label">Customer Name</label>
                        <div class="order-detail-value" th:text="${order.customer.name}">name</div>
                    </div>
                    <div class="col-md-6">
                        <label class="order-detail-label">Email Address</label>
                        <div class="order-detail-value" th:text="${order.customer.email}">email</div>
                    </div>
                    <div class="col-md-6">
                        <label class="order-detail-label">Phone Number</label>
                        <div class="order-detail-value" th:text="${order.customer.phone}">phone</div>
                    </div>
                    <div class="col-md-6">
                        <label class="order-detail-label">Delivery Address</label>
                        <div class="order-detail-value" th:text="${order.deliveryAddress}">address</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
