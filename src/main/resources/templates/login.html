<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Login – BookStore</title>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-card-header">
                <img src="/images/books.png" alt="BookStore" class="auth-logo"/>
                <h4 class="auth-title">Welcome back</h4>
                <p class="auth-subtitle">Sign in to your BookStore account</p>
            </div>

            <div th:if="${param.error}" class="auth-alert auth-alert-error">
                Invalid email or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="auth-alert auth-alert-success">
                You have been successfully logged out.
            </div>

            <form id="loginForm" method="post" th:action="@{/login}">
                <div class="auth-field">
                    <label for="username" class="auth-label">Email address</label>
                    <input class="auth-input" type="email" id="username" name="username"
                           placeholder="you@example.com" value="admin@gmail.com"
                           autocomplete="email"/>
                </div>
                <div class="auth-field">
                    <label for="password" class="auth-label">Password</label>
                    <input class="auth-input" type="password" id="password" name="password"
                           placeholder="••••••••" value="admin"
                           autocomplete="current-password"/>
                </div>
                <button type="submit" class="btn btn-buy w-100 mt-1">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a th:href="@{/registration}">Create one</a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
